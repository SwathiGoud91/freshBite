<section class="auth-container">

<div class="auth-box">

<h2>

Create Account

</h2>

<form id="registerForm">

<input

type="text"

id="name"

placeholder="Full Name"

required>

<input

type="email"

id="email"

placeholder="Email Address"

required>

<input

type="tel"

id="phone"

placeholder="Phone Number"

required>

<input

type="password"

id="password"

placeholder="Password"

required>

<input

type="password"

id="confirmPassword"

placeholder="Confirm Password"

required>

<button

type="submit"

class="btn primary-btn">

Register

</button>

</form>

<p>

Already have an account?

<a href="login.html" id="loginButton"  class="login-btn">

Login

</a>

</p>

</div>
